name: Generate AI Daily

on:
  # 手动触发
  workflow_dispatch:
  # 定时触发 - 每天 UTC 0:00 (北京时间 8:00)
  schedule:
    - cron: '0 0 * * *'
  # Issues 相关事件触发
  issues:
    types: [opened, edited, closed, reopened]

permissions:
  contents: write
  issues: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate daily news (scheduled only)
        if: github.event_name == 'schedule'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python generate_daily.py

      - name: Generate README and RSS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python main.py ${{ secrets.GITHUB_TOKEN }} ${{ github.repository }}

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Update AI Daily - $(date '+%Y-%m-%d %H:%M:%S')"
          git push
